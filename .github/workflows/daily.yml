name: Daily Puzzle
on:
  schedule:
    - cron: '0 0 * * *'
      timezone: 'America/Denver'
  workflow_dispatch:
    inputs:
      puzzle_id:
        description: 'Puzzle ID to backfill (leave empty for today)'
        required: false
      puzzle_date:
        description: 'Date for difficulty (YYYY-MM-DD, leave empty for today)'
        required: false
permissions:
  contents: write
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Generate today's puzzle
        run: |
          ARGS=""
          [ -n "${{ github.event.inputs.puzzle_id }}" ] && ARGS="$ARGS --id=${{ github.event.inputs.puzzle_id }}"
          [ -n "${{ github.event.inputs.puzzle_date }}" ] && ARGS="$ARGS --date=${{ github.event.inputs.puzzle_date }}"
          node generate.mjs $ARGS
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Commit and push
        run: |
          git config user.name "gist-bot"
          git config user.email "joe@pyoba.com"
          git add index.html puzzles.json
          git diff --staged --quiet || git commit -m "puzzle #$(date +'%Y-%m-%d')"
          git push
      - name: Sync puzzles.json to pyoba repo
        run: |
          git clone https://x-access-token:${{ secrets.PYOBA_SYNC_TOKEN }}@github.com/andetero/pyoba.git
          cp puzzles.json pyoba/puzzles.json
          cd pyoba
          git config user.name "gist-bot"
          git config user.email "joe@pyoba.com"
          git add puzzles.json
          git diff --staged --quiet || git commit -m "sync puzzles.json"
          git push
